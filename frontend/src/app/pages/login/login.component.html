<div class="login-container">
  <div class="login-box">
    <div class="brand">
      <span class="brand-text">El Diario</span>
      <span class="brand-accent">Manchego</span>
    </div>
    
    <h2>Bienvenido de nuevo</h2>
    <p class="subtitle">Ingresa a tu cuenta para gestionar contenido.</p>

    <div class="alert alert-error" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          autocomplete="email"
          placeholder="editor@manchego.com">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          autocomplete="current-password"
          placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading() || loginForm.invalid">
        <span *ngIf="!isLoading()">Iniciar Sesión</span>
        <span *ngIf="isLoading()" class="spinner">↻</span>
      </button>
    </form>
    
    <div class="back-link">
      <p>¿Eres un nuevo redactor? <a routerLink="/register">Regístrate aquí</a></p>
      <a routerLink="/home" class="portal-link">← Volver al portal</a>
    </div>
  </div>
</div>
