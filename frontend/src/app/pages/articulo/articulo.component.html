<div class="article-wrapper">
  <!-- Back navigation -->
  <nav class="article-nav">
    <button class="back-link" routerLink="/home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Volver al inicio
    </button>
  </nav>

  <!-- Loading State -->
  <div *ngIf="isLoading()" class="article-container skeleton-container">
    <div class="skeleton-image-hero"></div>
    <div class="skeleton-header">
      <div class="skeleton-line title"></div>
      <div class="skeleton-line title short"></div>
      <div class="skeleton-line meta"></div>
    </div>
    <div class="skeleton-content">
      <div *ngFor="let i of [1,2,3,4,5,6]" class="skeleton-line text"></div>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="error()" class="error-container">
    <div class="error-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <h2>¡Ups! Algo salió mal</h2>
      <p>{{ error() }}</p>
      <button class="btn-primary" routerLink="/home">Volver al Home</button>
    </div>
  </div>

  <!-- Article View -->
  <article *ngIf="article() as data" class="article-container fade-in">
    <!-- Hero Image Area -->
    <header class="article-hero">
      <div class="hero-image-wrapper">
        <!-- Dynamic header image with premium fallback -->
        <img [src]="data.customPhotoUrl || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=1600&h=600'" 
             [attr.data-debug-url]="data.customPhotoUrl"
             [alt]="data.titulo" class="hero-image">
        <div class="overlay"></div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="article-body">
      <div class="article-meta">
        <span class="badge" *ngIf="authService.canCreate()">{{ data.estado }}</span>
        <span class="date">{{ data.fecha_publicacion | date:'fullDate':'':'es' }}</span>
      </div>

      <h1 class="article-title">{{ data.titulo }}</h1>
      
      <!-- Admin Controls for Editors -->
      <div class="admin-controls" *ngIf="authService.isEditor()">
        <button class="btn-action delete-btn" title="Eliminar Noticia" (click)="openDeleteModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          Eliminar Noticia Definitivamente
        </button>
      </div>

      <div class="article-author">
        <div class="author-avatar">A</div>
        <div class="author-info">
          <p class="author-name">Redacción EDC</p>
          <p class="author-role">Periodista</p>
        </div>
      </div>

      <!-- Main Text -->
      <div class="article-text">
        <!-- Since we don't have rich HTML text right now, we format plain text nicely -->
        <p *ngFor="let paragraph of data.contenido.split('\n')">{{ paragraph }}</p>
      </div>
    </div>
  </article>

  <!-- CUSTOM DELETE MODAL FOR EDITOR -->
  <div class="modal-overlay" *ngIf="showDeleteModal()" (click)="closeDeleteModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div class="warning-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </div>
        <h2>¿Eliminar definitivamente?</h2>
      </div>
      <div class="modal-body">
        <p>Esta acción no se puede deshacer. Redirigirá al inicio tras su eliminación.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeDeleteModal()">Cancelar</button>
        <button class="btn-confirm-delete" (click)="confirmDelete()">Eliminar</button>
      </div>
    </div>
  </div>
</div>
