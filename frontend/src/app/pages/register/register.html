<div class="register-container">
  <div class="register-box">
    <div class="brand">
      <span class="brand-text">El Diario</span>
      <span class="brand-accent">Manchego</span>
    </div>
    
    <h2>Crea tu cuenta de Redactor</h2>
    <p class="subtitle">Únete a nuestro equipo y empieza a escribir.</p>

    <!-- Error Alert -->
    <div class="alert alert-error" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </div>

    <!-- Success Alert -->
    <div class="alert alert-success" *ngIf="successMessage()">
      {{ successMessage() }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="register-form" *ngIf="!successMessage()">
      
      <div class="input-group">
        <label for="nombre">Nombre Completo</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre" 
          [(ngModel)]="nombre" 
          required 
          autocomplete="name"
          placeholder="Ej: Miguel de Cervantes">
      </div>

      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          autocomplete="email"
          placeholder="miguel@manchego.com">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          autocomplete="new-password"
          placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading() || registerForm.invalid">
        <span *ngIf="!isLoading()">Regístrate</span>
        <span *ngIf="isLoading()" class="spinner">↻</span>
      </button>
    </form>
    
    <div class="back-link">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
