<nav class="premium-navbar">
  <div class="nav-container">
    <!-- Brand / Logo -->
    <div class="nav-brand" routerLink="/home">
      <span class="brand-text">El Diario</span>
      <span class="brand-accent">Manchego</span>
    </div>

    <!-- Separator -->
    <div class="nav-separator"></div>

    <!-- Navigation Links -->
    <ul class="nav-links">
      <li *ngFor="let section of sections">
        <!-- We use routerLinkActive to style the current page -->
        <a [routerLink]="section.path" routerLinkActive="active" class="nav-item">
          {{ section.label }}
        </a>
      </li>
    </ul>

    <!-- Right side: Authentication -->
    <div class="nav-actions">
      <!-- Guest State -->
      <ng-container *ngIf="!authService.currentUser()">
        <button class="btn-login" routerLink="/login">Entrar</button>
      </ng-container>

      <!-- Authenticated State -->
      <ng-container *ngIf="authService.currentUser() as user">
        <!-- New Article Button for Redactors/Editors -->
        <button class="btn-new-article" routerLink="/nueva-publicacion" *ngIf="authService.canCreate()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-plus">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nuevo Artículo
        </button>

        <div class="user-profile">
          <div class="avatar">{{ user.nombre.charAt(0).toUpperCase() }}</div>
          <span class="username">{{ user.nombre }}</span>
          <span class="role-badge" *ngIf="user.rol === 'EDITOR'">Editor</span>
        </div>
        <button class="icon-btn logout-btn" aria-label="Salir" (click)="logout()" title="Cerrar sesión">
          <!-- Log out icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </ng-container>
    </div>
  </div>
</nav>
